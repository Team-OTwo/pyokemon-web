name: Frontend Deploy to NAS (pnpm)

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 레포지토리 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Node.js 및 pnpm 설치
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9  # pnpm 버전

      # 3. 의존성 설치
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4. 빌드
      - name: Build React App
        run: pnpm build

      # 5. SSH 키 설정
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NAS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.NAS_SSH_PORT }} ${{ secrets.NAS_HOST }} >> ~/.ssh/known_hosts

      # 6. NAS로 배포
      - name: Deploy build files to NAS
        run: |
          rsync -avz --delete -e "ssh -p ${{ secrets.NAS_SSH_PORT }}" \
            ./build/ ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }}:/volume1/pyokemon-web/