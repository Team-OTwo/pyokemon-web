name: Frontend Deploy to NAS (pnpm)

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # pnpm 먼저 설정
      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      # Node.js 설치
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # pnpm 버전 확인 (디버깅용)
      - name: Check pnpm version
        run: pnpm --version

      # package.json 확인
      - name: Check package.json
        run: cat package.json | grep build

      # 의존성 설치
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # .env 파일 생성
      - name: Create .env file
        run: |
          touch .env
          echo "SKIP_PREFLIGHT_CHECK=true" >> .env
          echo "TSC_COMPILE_ON_ERROR=true" >> .env
          echo "ESLINT_NO_DEV_ERRORS=true" >> .env

      # 테스트 건너뛰기 및 타입 에러 무시하고 빌드
      - name: Build React App
        run: CI=false pnpm build

      # 빌드 디렉토리 확인
      - name: Check project directory structure
        run: |
          echo "프로젝트 루트 디렉토리:"
          ls -la
          echo "----------------------------"
          echo "dist 디렉토리 확인:"
          ls -la dist || echo "dist 디렉토리가 없습니다."
          echo "----------------------------"
          echo "build 디렉토리 확인:"
          ls -la build || echo "build 디렉토리가 없습니다."
      
      # rsync 및 SSH 도구 설치
      - name: Install required tools
        run: sudo apt-get update && sudo apt-get install -y openssh-client rsync

      # SSH 디버깅 활성화
      - name: Enable SSH debugging
        run: |
          mkdir -p ~/.ssh
          echo "LogLevel DEBUG" >> ~/.ssh/config
          chmod 700 ~/.ssh
          
      # SSH 키 설정
      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.NAS_SSH_PRIVATE_KEY }}
      
      # known_hosts 설정
      - name: Add NAS to known_hosts
        run: ssh-keyscan -p ${{ secrets.NAS_SSH_PORT || 22 }} ${{ secrets.NAS_HOST }} >> ~/.ssh/known_hosts
      
      # SSH 연결 테스트
      - name: Test SSH Connection
        run: ssh -v -p ${{ secrets.NAS_SSH_PORT || 22 }} ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }} 'echo "SSH Connection Test Successful"'
      
      # 배포 디렉토리 생성 및 권한 확인
      - name: Create and check permissions for deploy directory
        run: |
          DEPLOY_PATH="${{ secrets.NAS_DEPLOY_PATH || '/volume1/pyokemon-web/' }}"
          ssh -p ${{ secrets.NAS_SSH_PORT || 22 }} ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }} "mkdir -p $DEPLOY_PATH && chmod 755 $DEPLOY_PATH && ls -la $DEPLOY_PATH"
      
      # 올바른 빌드 디렉토리 찾기
      - name: Find build directory and deploy
        run: |
          BUILD_DIR="build"
          if [ ! -d "$BUILD_DIR" ]; then
            if [ -d "dist" ]; then
              BUILD_DIR="dist"
              echo "Using dist directory for deployment"
            else
              echo "ERROR: Could not find build output directory"
              exit 1
            fi
          fi
          
          echo "Starting deployment from $BUILD_DIR directory..."
          # -O 옵션 추가하여 권한 문제 해결
          rsync -avzO --delete -e "ssh -v -p ${{ secrets.NAS_SSH_PORT || 22 }}" \
          ./$BUILD_DIR/ ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }}:${{ secrets.NAS_DEPLOY_PATH || '/volume1/pyokemon-web/' }}
          echo "Deployment completed"