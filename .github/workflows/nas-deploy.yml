name: Frontend Deploy to NAS (pnpm)

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # pnpm 먼저 설정
      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      # Node.js 설치
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # pnpm 버전 확인 (디버깅용)
      - name: Check pnpm version
        run: pnpm --version

      # 의존성 설치
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # .env 파일 생성
      - name: Create .env file
        run: |
          touch .env
          echo "SKIP_PREFLIGHT_CHECK=true" >> .env
          echo "TSC_COMPILE_ON_ERROR=true" >> .env
          echo "ESLINT_NO_DEV_ERRORS=true" >> .env

      # TypeScript 체크를 건너뛰고 빌드
      - name: Build React App
        run: DISABLE_ESLINT_PLUGIN=true GENERATE_SOURCEMAP=false CI=false pnpm build --skipTypeCheck

      # 필요한 도구 설치
      - name: Install SSH client and rsync
        run: sudo apt-get update && sudo apt-get install -y openssh-client rsync

      # SSH 설정 
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NAS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          touch ~/.ssh/known_hosts
          echo "StrictHostKeyChecking no" > ~/.ssh/config
          ssh-keyscan -p ${{ secrets.NAS_SSH_PORT || 22 }} ${{ secrets.NAS_HOST }} >> ~/.ssh/known_hosts
        
      # 빌드 디렉토리 확인
      - name: Check build directory
        run: ls -la ./build || echo "Build directory not found"

      # NAS로 배포 - SSH 키 사용
      - name: Deploy to NAS using SSH key
        env:
          NAS_USER: ${{ secrets.NAS_USER }}
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_PORT: ${{ secrets.NAS_SSH_PORT || 22 }}
          NAS_PATH: ${{ secrets.NAS_DEPLOY_PATH || '/volume1/pyokemon-web/' }}
        run: |
          echo "Starting deployment..."
          rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa -p $NAS_PORT -o StrictHostKeyChecking=no" \
            ./build/ $NAS_USER@$NAS_HOST:$NAS_PATH
          echo "Deployment completed"