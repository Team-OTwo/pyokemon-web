name: Frontend Deploy to NAS (pnpm)

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # pnpm 먼저 설정
      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      # Node.js 설치
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # pnpm 버전 확인 (디버깅용)
      - name: Check pnpm version
        run: pnpm --version

      # 의존성 설치
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # .env 파일 생성
      - name: Create .env file
        run: |
          touch .env
          echo "SKIP_PREFLIGHT_CHECK=true" >> .env
          echo "TSC_COMPILE_ON_ERROR=true" >> .env
          echo "ESLINT_NO_DEV_ERRORS=true" >> .env

      # 테스트 건너뛰기 및 타입 에러 무시하고 빌드
      - name: Build React App
        run: CI=false pnpm build

      # SSH 키 설정
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NAS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.NAS_SSH_PORT }} ${{ secrets.NAS_HOST }} >> ~/.ssh/known_hosts

      # NAS로 배포
      - name: Deploy build files to NAS
        run: |
          rsync -avz --delete -e "ssh -p ${{ secrets.NAS_SSH_PORT }}" \
            ./build/ ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }}:/volume1/pyokemon-web/