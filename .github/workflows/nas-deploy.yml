name: NAS 배포

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: pnpm 설정
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Node.js 설정
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'pnpm'

      - name: 의존성 설치
        run: pnpm install

      - name: 빌드
        run: pnpm build
        env:
          CI: false

      - name: SSH 키 설정
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.NAS_SSH_PRIVATE_KEY }}

      - name: 배포
        run: |
          # 빌드 디렉토리 확인
          BUILD_DIR="dist"
          if [ ! -d "$BUILD_DIR" ]; then
            BUILD_DIR="build"
          fi
          
          # tar로 파일 전송
          cd $BUILD_DIR
          tar czf - * | ssh -o StrictHostKeyChecking=no -p ${{ secrets.NAS_SSH_PORT || 22 }} ${{ secrets.NAS_USER }}@${{ secrets.NAS_HOST }} "mkdir -p /volume1/web/ && cd /volume1/web/ && rm -rf * && tar xzf -"